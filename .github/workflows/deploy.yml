name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, 'ci: update built assets')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit built assets to main branch root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ .nojekyll
          git diff --staged --quiet && echo "nothing to commit" || git commit -m "ci: update built assets" && git push
